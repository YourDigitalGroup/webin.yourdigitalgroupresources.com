<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5" />
  <meta name="theme-color" content="#0b1e36" />
  <title>Round — 9 Point Game</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Serif:wght@500;600;700&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="masthead">
    <div class="masthead-top">
      <div class="wrap masthead-top-inner">
        <a class="brand" href="index.html">
          <span class="brand-mark">9</span>
          <span class="brand-name">9&nbsp;Point&nbsp;Game</span>
        </a>
        <button type="button" class="btn btn-ghost btn-sm" id="share-btn">Share</button>
      </div>
    </div>
    <div class="header-rule"></div>
  </header>

  <main>
    <!-- Round identity strip -->
    <section class="round-bar">
      <div class="wrap round-bar-inner">
        <div>
          <span class="round-bar-label">Round Code</span>
          <span class="round-bar-code" id="round-code">—</span>
        </div>
        <span class="round-bar-meta" id="round-meta">Loading…</span>
      </div>
    </section>

    <!-- SCOREKEEPER ENTRY — sits at the very top, big fields -->
    <section id="score-entry" class="wrap"></section>

    <!-- Leaderboard: one plaque per match -->
    <section class="wrap">
      <div class="plaque-stack" id="plaque-stack">
        <p class="page-sub" id="loading-msg">Loading the leaderboard…</p>
      </div>
    </section>

    <!-- Hole-by-hole breakdown -->
    <section class="section wrap" id="hole-section" hidden>
      <h2 class="setup-h" id="hole-section-title">Hole by Hole</h2>
      <div class="hole-table-wrap">
        <table class="hole-table" id="hole-table"></table>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="wrap">
      <p class="footer-text">
        An independent scoring app for the 3-man/9-point, 4-man/12-point, and
        5-man/15-point games. Not affiliated with the USGA.
      </p>
    </div>
  </footer>

  <script src="config.js" defer></script>
  <script src="scoring.js" defer></script>
  <script src="round.js" type="module"></script>
</body>
</html>
